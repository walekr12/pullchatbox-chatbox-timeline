name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Build renderer and main bundles
        shell: pwsh
        run: pnpm run build

      - name: Package Windows app
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder build --win --publish never

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-windows
          path: |
            release/build/*.exe
            release/build/*.blockmap
            release/build/latest*.yml
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME } else { "windows-build-$env:GITHUB_RUN_NUMBER" }
          gh release create $tag release/build/*.exe release/build/*.blockmap release/build/latest*.yml --target $env:GITHUB_SHA --title "Windows build $tag" --notes "Automated Windows build for $env:GITHUB_SHA"
